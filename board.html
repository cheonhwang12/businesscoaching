    <style>
      /* 게시글 목록 페이지 */
      .board-hero {
        padding: 100px 20px 40px;
        text-align: center;
        background: #f8fafc;
        position: relative;
        overflow: hidden;
      }

      .board-hero::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(ellipse at 30% 50%, #f1f5f9 0%, transparent 60%),
          radial-gradient(ellipse at 70% 30%, #f8fafc 0%, transparent 50%);
        pointer-events: none;
      }

      .board-hero-content {
        position: relative;
        max-width: 700px;
        margin: 0 auto;
      }

      .board-hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 20px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 100px;
        font-size: 14px;
        font-weight: 600;
        color: #1e4a8d;
        margin-bottom: 24px;
      }

      .board-hero-badge svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
      }

      .board-hero h1 {
        font-size: 40px;
        font-weight: 800;
        color: #0f2442;
        line-height: 1.3;
        letter-spacing: -0.02em;
        margin-bottom: 16px;
      }

      .board-hero p {
        font-size: 17px;
        color: #64748b;
        line-height: 1.7;
      }

      /* 필터 + 목록 영역 */
      .board-section {
        padding: 0 20px 80px;
        background: #f8fafc;
        min-height: 60vh;
      }

      .board-container {
        max-width: 1200px;
        margin: 0 auto;
      }

      /* 카테고리 필터 */
      .board-filters {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 40px;
        flex-wrap: wrap;
      }

      .filter-btn {
        padding: 10px 22px;
        background: #ffffff;
        border: 1px solid #f1f5f9;
        border-radius: 100px;
        color: #64748b;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.25s ease;
        font-family: "Pretendard", sans-serif;
      }

      .filter-btn:hover {
        background: #ffffff;
        border-color: #1e4a8d;
        color: #1e4a8d;
      }

      .filter-btn.active {
        background: #1e4a8d;
        border-color: #1e4a8d;
        color: #ffffff;
        font-weight: 600;
      }

      /* 게시글 카드 그리드 */
      .board-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
      }

      .board-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        overflow: hidden;
        text-decoration: none;
        transition: all 0.35s ease;
        display: flex;
        flex-direction: column;
      }

      .board-card:hover {
        background: #ffffff;
        border-color: #1e4a8d;
        transform: translateY(-6px);
        box-shadow: 0 8px 24px rgba(15, 36, 66, 0.12);
      }

      .board-card-thumb {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #ffffff;
        overflow: hidden;
      }

      .board-card-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }

      .board-card:hover .board-card-thumb img {
        transform: scale(1.05);
      }

      .board-card-thumb-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #e2e8f0, #f1f5f9);
      }

      .board-card-thumb-placeholder svg {
        width: 48px;
        height: 48px;
        stroke: #e2e8f0;
        fill: none;
      }

      .board-card-body {
        padding: 22px 22px 26px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .board-card-category {
        display: inline-block;
        font-size: 12px;
        font-weight: 600;
        color: #1e4a8d;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
      }

      .board-card-title {
        font-size: 18px;
        font-weight: 700;
        color: #0f2442;
        line-height: 1.45;
        margin-bottom: 10px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .board-card-desc {
        font-size: 14px;
        color: #64748b;
        line-height: 1.6;
        margin-bottom: 16px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex: 1;
      }

      .board-card-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        color: #64748b;
      }

      .board-card-meta svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
      }

      .board-card-meta-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .board-card-meta-divider {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #e2e8f0;
      }

      /* 로딩 상태 */
      .board-loading {
        text-align: center;
        padding: 50px 20px;
        color: #64748b;
      }

      .board-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #f1f5f9;
        border-top-color: #1e4a8d;
        border-radius: 50%;
        animation: spin 1s linear bizcoach;
        margin: 0 auto 20px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* 빈 상태 */
      .board-empty {
        text-align: center;
        padding: 50px 20px;
        display: none;
      }

      .board-empty-icon {
        width: 64px;
        height: 64px;
        stroke: #e2e8f0;
        fill: none;
        margin: 0 auto 20px;
      }

      .board-empty p {
        color: #64748b;
        font-size: 16px;
      }

      /* CTA 배너 */
      .board-cta {
        margin-top: 36px;
        padding: 48px 40px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        text-align: center;
      }

      .board-cta h3 {
        font-size: 22px;
        font-weight: 700;
        color: #0f2442;
        margin-bottom: 12px;
      }

      .board-cta p {
        color: #64748b;
        margin-bottom: 24px;
        font-size: 15px;
      }

      .board-cta-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 32px;
        background: #ffffff;
        border: none;
        border-radius: 12px;
        color: #1e4a8d;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
        box-shadow: 0 4px 20px #f1f5f9;
      }

      .board-cta-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px #e2e8f0;
      }

      .board-cta-btn svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        fill: none;
      }

      /* Top 버튼 */
      .top-button {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #1e4a8d, #2a6ab8);
        border: 1px solid #3b82f6;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        z-index: 1000;
        box-shadow: 0 4px 20px #e2e8f0;
      }

      .top-button.visible {
        opacity: 1;
        visibility: visible;
      }

      .top-button:hover {
        transform: translateY(-3px);
        box-shadow:
          0 0 25px rgba(255, 255, 255, 0.4),
          0 0 50px #e2e8f0;
      }

      .top-button svg {
        width: 24px;
        height: 24px;
        stroke: #ffffff;
        fill: none;
      }

      /* 반응형 - 태블릿 */
      @media (max-width: 1024px) {
        .board-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* 모바일: 헤더(72px) + 모바일네비(~117px) = ~190px 고정영역 */
      @media (max-width: 968px) {
        .board-hero {
          padding-top: 210px;
        }
      }

      /* 반응형 - 모바일 */
      @media (max-width: 768px) {
        .board-hero {
          padding: 210px 16px 40px;
        }

        .board-hero h1 {
          font-size: 28px;
        }

        .board-hero p {
          font-size: 15px;
        }

        .board-section {
          padding: 0 16px 60px;
        }

        .board-filters {
          gap: 8px;
          margin-bottom: 28px;
        }

        .filter-btn {
          padding: 8px 16px;
          font-size: 13px;
        }

        .board-grid {
          grid-template-columns: 1fr;
          gap: 16px;
        }

        .board-card-body {
          padding: 18px 18px 22px;
        }

        .board-card-title {
          font-size: 16px;
        }

        .board-cta {
          padding: 36px 20px;
          margin-top: 40px;
        }

        .board-cta h3 {
          font-size: 18px;
        }

        .board-card-title,
        .board-cta h3,
        .board-cta p,
        .board-hero h1,
        .board-hero p {
          word-break: keep-all;
          overflow-wrap: break-word;
        }
      }

      /* 360px 이하 초소형 모바일 */
      @media (max-width: 400px) {
        .board-hero {
          padding: 210px 12px 32px;
        }

        .board-hero h1 {
          font-size: 24px;
        }

        .board-hero p {
          font-size: 14px;
        }

        .board-section {
          padding: 0 12px 48px;
        }

        .board-filters {
          gap: 6px;
        }

        .filter-btn {
          padding: 7px 12px;
          font-size: 12px;
        }

        .board-card-body {
          padding: 14px 14px 18px;
        }

        .board-card-title {
          font-size: 15px;
        }

        .board-card-desc {
          font-size: 13px;
        }

        .board-card-meta {
          font-size: 12px;
        }

        .board-cta {
          padding: 28px 16px;
        }

        .board-cta h3 {
          font-size: 17px;
        }

        .board-cta p {
          font-size: 14px;
        }

        .board-cta-btn {
          padding: 14px 24px;
          font-size: 15px;
        }
      }
    </style>
